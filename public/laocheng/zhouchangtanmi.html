<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>源城小卫士 · 周长探险 | 北师大版三年级数学</title>
    <style>
        * { box-sizing: border-box; user-select: none; }

        body {
            background: linear-gradient(145deg, #c8e8e9 0%, #9fd3c7 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 1280px;
            background: #fffef7;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hero {
            background: #2b5e3b;
            background-image: radial-gradient(circle at 10% 30%, #3d7a4a, #1f4a2c);
            padding: 18px 32px 14px 32px;
            color: #f9eec1;
            text-shadow: 2px 2px 0 #1f3a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-area h1 { margin: 0; font-size: 1.8rem; display: inline-flex; align-items: center; gap: 8px; }
        .title-area p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.9; }

        .right-area { display: flex; align-items: center; gap: 15px; }

        .score-board {
            background: #ffd966;
            padding: 8px 24px;
            border-radius: 60px;
            color: #2d3e1f;
            font-weight: bold;
            font-size: 1.8rem;
            box-shadow: inset 0 -2px 0 #b97f10, 0 6px 12px rgba(0,0,0,0.1);
        }
        .score-board span { font-size: 1rem; }

        /* ========= 源知微动态角色样式 ========= */
        .avatar-small {
            position: relative;
            border-radius: 50%;
            background: #f9eec1;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: float 2.5s ease-in-out infinite;
        }
        .avatar-small { width: 64px; height: 64px; cursor: pointer; }
        
        .avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* 眨眼遮罩 */
        .blink-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.25) 80%);
            border-radius: 50%;
            pointer-events: none;
            animation: blink 4s infinite;
        }
        @keyframes blink { 0%,94%,100% { opacity: 0; } 95%,98% { opacity: 1; } }

        /* 浮动 */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }

        /* 说话气泡（跳动点） */
        .speaking-bubble {
            position: absolute;
            top: -18px;
            right: -8px;
            background: white;
            border-radius: 30px;
            padding: 5px 10px;
            display: flex;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: fadeInOut 1s infinite;
            z-index: 10;
        }
        .speaking-bubble span {
            width: 8px;
            height: 8px;
            background: #2b5e3b;
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }
        .speaking-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .speaking-bubble span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { transform: translateY(0); opacity: 0.4; } to { transform: translateY(-6px); opacity: 1; } }
        @keyframes fadeInOut { 0% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 声波扩散动画（模拟说话时的音波） */
        .sound-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255,215,0,0.3);
            transform: translate(-50%, -50%) scale(0.8);
            animation: soundPulse 1.2s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes soundPulse {
            0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
        }

        /* 点头/弹跳反馈（答题时触发） */
        .nod-animation {
            animation: nod 0.3s ease-in-out !important;
        }
        @keyframes nod {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .game-body { padding: 20px 30px 30px; flex: 1; background: #fffef7; }
        .info-bar { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 20px; }
        .progress { background: #ddd2a4; padding: 5px 18px; border-radius: 50px; font-size: 0.95rem; font-weight: bold; color: #2c4b1c; }
        .interact-tip { font-size: 0.8rem; color: #b87c2e; background: #fff3df; padding: 4px 14px; border-radius: 30px; }
        .question-card { position: relative; background: #fef7e0; border-radius: 48px; padding: 20px 28px; margin-bottom: 20px; box-shadow: 0 8px 0 #d9c48b; border: 1px solid #ffe2a4; }
        .q-text { font-size: 1.5rem; font-weight: bold; color: #2c4727; margin-bottom: 20px; background: #fff0c0; display: inline-block; padding: 8px 28px; border-radius: 60px; }
        .graphic-area { background: #ffffff; border-radius: 48px; padding: 20px; margin: 15px 0 20px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 30px; box-shadow: inset 0 0 0 2px #f3e1b3, 0 8px 15px rgba(0,0,0,0.05); min-height: 200px; overflow: hidden; }
        .shape-svg { background: #fef8e7; border-radius: 36px; padding: 12px; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; }
        .shape-svg svg { width: 180px; height: auto; max-width: 100%; display: block; }
        .character-stage {
            position: absolute;
            right: 16px;
            bottom: 66px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 330px;
            height: 400px;
            isolation: isolate;
            pointer-events: none;
        }
        .character-glow {
            position: absolute;
            bottom: 8px;
            width: 78%;
            height: 42%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 102, 0.36), rgba(154, 204, 128, 0.12) 55%, transparent 72%);
            filter: blur(2px);
            z-index: -1;
        }
        .main-character {
            width: min(315px, 100%);
            height: auto;
            max-height: 390px;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 1;
            transform-origin: bottom center;
            animation: characterIdle 3.2s ease-in-out infinite;
            filter: drop-shadow(0 12px 16px rgba(58, 77, 44, 0.18));
        }
        .character-stage.is-happy .main-character { animation: characterHappy 0.7s ease, characterIdle 3.2s ease-in-out 0.7s infinite; }
        .character-stage.is-thinking .main-character { animation: characterThinking 0.75s ease, characterIdle 3.2s ease-in-out 0.75s infinite; }
        .character-stage.is-pointing .main-character { animation: characterPointing 1.1s ease, characterIdle 3.2s ease-in-out 1.1s infinite; }
        .character-stage.is-finish .main-character { animation: characterFinish 1s ease, characterIdle 2.6s ease-in-out 1s infinite; }
        .character-bubble {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 205px;
            background: #fff6d6;
            color: #2c4727;
            border: 2px solid #f2d076;
            border-radius: 28px;
            padding: 8px 12px;
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.35;
            box-shadow: 0 8px 16px rgba(72, 83, 46, 0.14);
            z-index: 2;
        }
        .character-bubble::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -10px;
            width: 18px;
            height: 18px;
            background: #fff6d6;
            border-right: 2px solid #f2d076;
            border-bottom: 2px solid #f2d076;
            transform: translateX(-50%) rotate(45deg);
        }
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffd966;
            opacity: 0;
            animation: sparklePop 1.2s ease-out infinite;
        }
        .sparkle.one { top: 34%; right: 18%; animation-delay: 0.1s; }
        .sparkle.two { top: 52%; left: 18%; width: 8px; height: 8px; animation-delay: 0.45s; }
        .sparkle.three { top: 22%; right: 38%; width: 7px; height: 7px; animation-delay: 0.8s; }
        .options { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; margin: 20px 250px 10px 0; }
        .opt-btn { background: #e7e2c7; border: none; font-size: 1.1rem; font-weight: bold; padding: 12px 28px; border-radius: 60px; font-family: inherit; color: #2b4b1e; box-shadow: 0 5px 0 #b0a16b; cursor: pointer; transition: 0.05s linear; }
        .opt-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b0a16b; }
        .opt-btn.correct-highlight { background: #6fbf4c; color: white; box-shadow: 0 5px 0 #3a721f; }
        .opt-btn.wrong-highlight { background: #e6846e; color: white; box-shadow: 0 5px 0 #aa4a34; }
        .feedback-wrapper { display: flex; align-items: center; gap: 20px; margin-top: 20px; background: #fff0cf; border-radius: 30px; padding: 14px 20px; }
        .feedback-text { flex: 1; font-size: 1.2rem; font-weight: bold; color: #2c4727; line-height: 1.4; }
        .next-btn { background: #ffaa33; border: none; font-size: 1.2rem; padding: 12px 32px; border-radius: 50px; font-weight: bold; color: #2e3b1f; margin: 20px auto 0; cursor: pointer; width: fit-content; box-shadow: 0 5px 0 #b4621a; display: block; }
        .next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b4621a; }
        footer { background: #d9cb9c; text-align: center; padding: 12px; font-size: 0.75rem; color: #4b5c2c; }
        .role-tip { background: #ffecb3; padding: 8px 16px; border-radius: 40px; font-size: 0.9rem; color: #945f14; text-align: center; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; font-weight: bold; }

        @keyframes characterIdle {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }
        @keyframes characterHappy {
            0%, 100% { transform: translateY(0) scale(1); }
            35% { transform: translateY(-18px) scale(1.04) rotate(2deg); }
            70% { transform: translateY(3px) scale(0.98) rotate(-1deg); }
        }
        @keyframes characterThinking {
            0%, 100% { transform: rotate(0); }
            24% { transform: rotate(-4deg); }
            52% { transform: rotate(4deg); }
            76% { transform: rotate(-2deg); }
        }
        @keyframes characterPointing {
            0%, 100% { transform: translateX(0) rotate(0); }
            35% { transform: translateX(-10px) rotate(-2deg); }
            70% { transform: translateX(-4px) rotate(1deg); }
        }
        @keyframes characterFinish {
            0%, 100% { transform: translateY(0) scale(1); }
            28% { transform: translateY(-16px) scale(1.05) rotate(-3deg); }
            56% { transform: translateY(-8px) scale(1.03) rotate(3deg); }
        }
        @keyframes sparklePop {
            0% { transform: translateY(8px) scale(0.3); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(-22px) scale(1.1); opacity: 0; }
        }

        @media (max-width: 900px) {
            .hero { padding: 12px 20px; }
            .title-area h1 { font-size: 1.4rem; }
            .score-board { font-size: 1.4rem; padding: 5px 16px; }
            .avatar-small { width: 52px; height: 52px; }
            .q-text { font-size: 1.2rem; }
            .opt-btn { font-size: 0.9rem; padding: 8px 18px; }
            .graphic-area { min-height: 200px; }
            .shape-svg svg { width: 140px; }
            .main-character { max-height: 290px; }
            .character-stage { right: 8px; bottom: 66px; width: 230px; height: 310px; }
            .character-bubble { top: -26px; font-size: 0.88rem; max-width: 170px; }
            .options { margin-right: 210px; }
        }
        @media (max-width: 650px) {
            body { align-items: flex-start; padding: 10px; }
            .game-container { border-radius: 28px; }
            .game-body { padding: 16px 14px 22px; }
            .question-card { border-radius: 30px; padding: 16px; }
            .q-text { border-radius: 28px; padding: 8px 16px; }
            .graphic-area { min-height: 200px; gap: 12px; border-radius: 30px; }
            .shape-svg { min-height: 150px; border-radius: 24px; }
            .shape-svg svg { width: 110px; }
            .character-stage { position: relative; right: auto; bottom: auto; width: 180px; height: 240px; margin: 8px auto 0; }
            .main-character { max-height: 230px; }
            .character-bubble { top: -30px; max-width: 150px; font-size: 0.84rem; }
            .options { margin-right: 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hero">
        <div class="title-area">
            <h1>🏯 源城小卫士 · 周长探险 🌿</h1>
            <p>✨ 与「源知微」一起守护源城文脉 ✨</p>
        </div>
        <div class="right-area">
            <div class="score-board">🌟 <span id="scoreValue">0</span> <span>分</span></div>
            <div class="avatar-small" id="avatarHeader">
                <img id="headerImg" src="yuanzhiwei_idle.png" alt="源知微">
                <div class="blink-overlay"></div>
                <div class="speaking-bubble"><span></span><span></span><span></span></div>
                <div class="sound-wave"></div>
            </div>
        </div>
    </div>
    <div class="game-body">
        <div class="role-tip">
            <span>✨ 数字主角「源知微」会根据你的答题表现切换表情和动作 ✨</span>
        </div>
        <div class="info-bar">
            <div class="progress" id="questionCounter">第1 / 5关</div>
            <div class="interact-tip">✏️ 点击选项，源知微会为你加油~</div>
        </div>
        <div id="quizArea"></div>
    </div>
    <footer>🌱 数学眼光看家乡 | 龟峰塔 · 鳄湖 · 太平古街 · 李焘故居 | 周长——封闭图形一周的长度</footer>
</div>

<script>
    // 题库（5题）
    const questions = [
        { text: "🐢 龟峰塔的塔基是一个正六边形。下面哪个选项能正确表示“周长”？", graphic: "hexagon", options: ["六边形一圈边线的总长度", "六边形中间最长的线", "六边形一个角到对面的长度"], correct: 0, explanation: "✅ 周长就是封闭图形一周的长度！正六边形的周长 = 所有边长加起来。" },
        { text: "🏛️ 李焘故居的院子是一个长方形，长8米，宽5米。它的周长是多少米？", graphic: "rectangle", options: ["26米", "40米", "13米"], correct: 0, explanation: "🎉 长方形周长 = (长+宽)×2 = (8+5)×2 = 26米！" },
        { text: "🛤️ 太平古街的石板路（下图）起点和终点不连在一起，它是一个开口图形。它有周长吗？", graphic: "openPath", options: ["有周长，把两头连起来就有", "没有周长，因为不是封闭图形", "有周长，量所有边的总长"], correct: 1, explanation: "🧠 只有封闭图形才有周长！开口图形没有一周，所以没有周长。" },
        { text: "🍃 大叶飞榕的叶片形状不规则，下面哪个是测量叶片周长的正确步骤？", graphic: "leaf", options: ["用直尺一段段量叶片边缘", "用细绳沿着叶片边缘围一圈，标记起点终点，再拉直量", "用眼睛估计长度"], correct: 1, explanation: "🌿 太棒啦！不规则图形也是用绳子围一圈再测量。" },
        { text: "🏯 龟峰塔六边形塔基，每条边长约5米。它的周长是多少米？", graphic: "hexagonWithSide", options: ["25米", "35米", "30米"], correct: 2, explanation: "✨ 正六边形周长=边长×6=5×6=30米。" }
    ];

    let currentIndex = 0, score = 0, answered = false;
    const quizArea = document.getElementById("quizArea");
    const scoreSpan = document.getElementById("scoreValue");
    const counterSpan = document.getElementById("questionCounter");

    const characterAssets = {
        idle: "yuanzhiwei_idle.png",
        happy: "yuanzhiwei_happy.png",
        thinking: "yuanzhiwei_thinking.png",
        pointing: "yuanzhiwei_pointing.png",
        encourage: "yuanzhiwei_encourage.png",
        finish: "yuanzhiwei_finish.png",
        blink: "yuanzhiwei_blink.png"
    };

    const characterLines = {
        idle: "先找图形的一周，再判断周长。",
        pointing: "看这里，边线围成一圈了吗？",
        happy: "太棒啦！周长能量 +10！",
        thinking: "没关系，再想想：是不是封闭图形？",
        encourage: "下一关来了，继续用数学眼光观察！",
        finish: "恭喜完成探险，源城文脉能量满满！"
    };

    // 触发角色“点头”动画（说话反应）
    function triggerCharacterNod() {
        const headerChar = document.querySelector("#avatarHeader");
        if (headerChar) {
            headerChar.classList.add("nod-animation");
            setTimeout(() => headerChar.classList.remove("nod-animation"), 300);
        }
    }

    function renderCharacter(state = "idle", line = characterLines.idle) {
        return `<div class="character-stage is-${state}" id="characterStage">
            <div class="character-glow"></div>
            <div class="character-bubble" id="characterBubble">${line}</div>
            <img class="main-character" id="mainCharacter" src="${characterAssets[state] || characterAssets.idle}" alt="源知微${line}">
            <span class="sparkle one"></span>
            <span class="sparkle two"></span>
            <span class="sparkle three"></span>
        </div>`;
    }

    function setCharacterState(state, line = characterLines[state] || characterLines.idle) {
        const stage = document.getElementById("characterStage");
        const image = document.getElementById("mainCharacter");
        const bubble = document.getElementById("characterBubble");
        const headerImg = document.getElementById("headerImg");
        if (!stage || !image || !bubble) return;
        stage.className = `character-stage is-${state}`;
        image.src = characterAssets[state] || characterAssets.idle;
        image.alt = `源知微${line}`;
        bubble.innerText = line;
        if (headerImg) headerImg.src = characterAssets.blink;
        setTimeout(() => {
            if (headerImg) headerImg.src = characterAssets.idle;
        }, 500);
    }

    // SVG图形渲染
    function renderGraphic(type) {
        const svgs = {
            hexagon: `<svg width="180" height="160" viewBox="0 0 200 180"><polygon points="100,20 170,60 170,120 100,160 30,120 30,60" fill="#E9F5D9" stroke="#2c6e2e" stroke-width="4" stroke-dasharray="6 4"/><text x="100" y="100" text-anchor="middle" fill="#3b5c2a" font-size="14" font-weight="bold">龟峰塔塔基</text></svg>`,
            rectangle: `<svg width="200" height="130" viewBox="0 0 240 150"><rect x="30" y="30" width="180" height="90" fill="#FCE9B4" stroke="#2c6e2e" stroke-width="4" stroke-dasharray="6 3"/><text x="120" y="55" text-anchor="middle" fill="#ad7a2c" font-size="12">长 8m</text><text x="50" y="85" text-anchor="middle" fill="#ad7a2c" font-size="12">宽5m</text><text x="120" y="115" text-anchor="middle" fill="#3f6b2f" font-weight="bold">李焘故居</text></svg>`,
            openPath: `<svg width="200" height="100" viewBox="0 0 240 120"><polyline points="30,70 80,30 130,60 180,40 210,80" fill="none" stroke="#b5651d" stroke-width="6"/><circle cx="30" cy="70" r="5" fill="red"/><text x="20" y="60" fill="red" font-size="12">起点</text><circle cx="210" cy="80" r="5" fill="blue"/><text x="200" y="105" fill="blue" font-size="12">终点</text><text x="100" y="30" fill="#6b4c2c" font-weight="bold">太平古街石板路</text></svg>`,
            leaf: `<svg width="180" height="140" viewBox="0 0 200 160"><path d="M100,30 Q140,50 150,80 Q160,110 120,130 Q80,150 50,120 Q20,90 40,60 Q60,30 100,30Z" fill="#A7D489" stroke="#3c8c40" stroke-width="4" stroke-dasharray="5 3"/><text x="95" y="90" text-anchor="middle" fill="#2a572a" font-size="13">大叶飞榕</text></svg>`,
            hexagonWithSide: `<svg width="180" height="160" viewBox="0 0 200 180"><polygon points="100,20 170,60 170,120 100,160 30,120 30,60" fill="#E6F0D2" stroke="#3b754b" stroke-width="4"/><text x="100" y="105" text-anchor="middle" fill="#1f5420" font-size="14">边长5m</text><text x="100" y="145" text-anchor="middle" fill="#ab6f2f" font-weight="bold">龟峰塔基</text></svg>`
        };
        return svgs[type] || "<div>🏞️</div>";
    }

    function updateScoreUI() { scoreSpan.innerText = score; }

    function handleAnswer(selectedIdx, correctIdx, explanation) {
        if (answered) return;
        answered = true;
        const isCorrect = selectedIdx === correctIdx;
        if (isCorrect) { score += 10; updateScoreUI(); }
        // 触发角色点头动画
        triggerCharacterNod();
        setCharacterState(isCorrect ? "happy" : "thinking");

        document.querySelectorAll(".opt-btn").forEach((btn, idx) => {
            btn.disabled = true;
            if (idx === correctIdx) btn.classList.add("correct-highlight");
            if (idx === selectedIdx && idx !== correctIdx) btn.classList.add("wrong-highlight");
        });
        const fbText = document.querySelector(".feedback-text");
        if (isCorrect) fbText.innerHTML = `🎉 完全正确！ +10分！<br> ${explanation}`;
        else {
            const correctLetter = String.fromCharCode(65+correctIdx);
            fbText.innerHTML = `😲 再想一想~ 正确答案是 ${correctLetter}. ${questions[currentIndex].options[correctIdx]}<br> ${explanation} 继续加油！✨`;
        }
        if (!document.querySelector(".next-btn")) {
            const btn = document.createElement("button");
            btn.innerText = currentIndex+1 === questions.length ? "🏆 完成挑战，领取文脉能量珠 🏆" : "➡️ 下一关 ➡️";
            btn.className = "next-btn";
            btn.onclick = () => {
                if (currentIndex+1 < questions.length) { currentIndex++; answered=false; renderCurrentQuestion("encourage"); }
                else finishGame();
            };
            quizArea.appendChild(btn);
        } else {
            const nb = document.querySelector(".next-btn");
            if (currentIndex+1 === questions.length) nb.innerText = "🏆 完成挑战，领取文脉能量珠 🏆";
            else nb.innerText = "➡️ 下一关 ➡️";
        }
    }

    function finishGame() {
        const perfect = score === 50;
        let msg = perfect ? "🏅 源城守护者 · 周长大师！满分！ 🌟" : (score>=30 ? `🎊 获得 ${score} 分！真棒！` : `📚 获得 ${score} 分，再试试看！`);
        quizArea.innerHTML = `<div class="question-card" style="text-align:center;"><div class="q-text">🎉 探险结束 🎉</div><div class="graphic-area"><div class="shape-svg"><svg width="160" height="120" viewBox="0 0 200 150"><polygon points="100,20 160,50 160,100 100,130 40,100 40,50" fill="#FFD966" stroke="#B47C2E" stroke-width="3"/><text x="100" y="85" text-anchor="middle" fill="#3d5a2b" font-size="18">🏯</text></svg><p style="font-size:1.3rem;">🌟 ${msg}</p><p style="background:#fdebb3; padding:12px; border-radius:28px;">✨ 源知微：“感谢你用数学的眼睛守护源城文脉！” ✨</p></div>${renderCharacter("finish", characterLines.finish)}</div><button class="next-btn" id="restartGameBtn" style="background:#5c9e3e; color:white;">🔄 重新挑战 🔄</button></div>`;
        document.getElementById("restartGameBtn")?.addEventListener("click", () => { currentIndex=0; score=0; answered=false; updateScoreUI(); renderCurrentQuestion(); });
    }

    function renderCurrentQuestion(characterState = "pointing") {
        const q = questions[currentIndex];
        counterSpan.innerText = `第${currentIndex+1} / ${questions.length}关`;
        const optionsHtml = `<div class="options">${q.options.map((opt,idx)=>`<button class="opt-btn" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`).join('')}</div>`;
        const state = characterState === "encourage" ? "encourage" : "pointing";
        const feedbackHtml = `<div class="feedback-wrapper" role="status" aria-live="polite"><div class="feedback-text">✨ 点击选项，为源城文脉贡献力量 ✨</div></div>`;
        quizArea.innerHTML = `<div class="question-card"><div class="q-text">🔍 ${q.text}</div><div class="graphic-area"><div class="shape-svg">${renderGraphic(q.graphic)}</div></div>${optionsHtml}${renderCharacter(state, characterLines[state])}${feedbackHtml}</div>`;
        document.querySelectorAll(".opt-btn").forEach(btn => btn.addEventListener("click", (e) => { if(!answered) handleAnswer(parseInt(btn.dataset.optIndex), q.correct, q.explanation); }));
        const oldNext = document.querySelector(".next-btn");
        if(oldNext && !oldNext.id) oldNext.remove();
        answered = false;
    }

    // 初始化
    renderCurrentQuestion();
</script>
</body>
</html>
