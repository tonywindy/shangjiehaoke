<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品展示 - 上节好课</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* CSS变量定义 */
    :root {
      /* 动画时长 */
      --transition-fast: 0.3s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "LXGW WenKai", serif;
      background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 50%, #e8ebff 100%);
      min-height: 100vh;
      color: #2d3748;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .main-content {
      padding-top: 120px;
      padding-bottom: 80px;
    }

    .hero-section {
      text-align: center;
      margin-bottom: 80px;
      padding: 60px 0;
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 800;
      color: #1a202c;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: #718096;
      font-weight: 400;
      max-width: 600px;
      margin: 0 auto;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      z-index: 100;
      transition: all var(--transition-fast) ease;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #2c5aa0;
      text-decoration: none;
    }

    .nav-menu {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-link {
      color: #718096;
      text-decoration: none;
      font-weight: 500;
      transition: all var(--transition-fast) ease;
      position: relative;
      padding: 8px 0;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: #2c5aa0;
      transition: width var(--transition-fast) ease;
    }

    .nav-link:hover {
      color: #2c5aa0;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      margin-bottom: 80px;
    }

    .work-item {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      transition: all var(--transition-fast) ease;
      border: 1px solid rgba(0, 0, 0, 0.05);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .work-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .work-image-container {
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      background: #f7fafc;
    }

    .work-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .work-item:hover img {
      transform: scale(1.05);
    }

    .work-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    .work-item h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
      margin: 0;
      text-align: center;
      line-height: 1.4;
      transition: color 0.3s ease;
    }

    .work-item:hover h3 {
      color: #2c5aa0;
    }

    @media (max-width: 1200px) {
      .works-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }
    }

    @media (max-width: 992px) {
      .works-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .works-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 2rem;
      }

      .nav-menu {
        gap: 16px;
      }

      .nav-link {
        font-size: 0.9rem;
      }
    }

    /* 意见之箱样式 */
    .feedback-container {
      position: relative;
      display: inline-block;
    }

    .qr-popup {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 1000;
      border: 1px solid rgba(0, 0, 0, 0.1);
      min-width: 200px;
    }

    .feedback-container:hover .qr-popup {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .qr-popup::before {
      content: '';
      position: absolute;
      top: -8px;
      right: 20px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 8px solid white;
    }

    .qr-code {
      width: 150px;
      height: 150px;
      margin: 0 auto 12px;
      display: block;
      border-radius: 8px;
    }

    .qr-text {
      text-align: center;
      color: #4a5568;
      font-size: 0.9rem;
      line-height: 1.4;
    }
  </style>
</head>
