<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时钟夹角学习工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .clock-face {
            touch-action: none; /* Prevent scrolling when dragging on mobile */
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background: white;
            border-radius: 50%;
            position: relative;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            z-index: 10;
            cursor: grab;
            transition: transform 0.1s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }

        .hand:active {
            cursor: grabbing;
            transition: none; /* Remove transition for instant follow during drag */
        }

        .hour-hand {
            width: 8px;
            height: 70px;
            background-color: #ef4444; /* Red */
            margin-left: -4px; /* Center horizontally */
        }

        .minute-hand {
            width: 6px;
            height: 100px;
            background-color: #3b82f6; /* Blue */
            margin-left: -3px; /* Center horizontally */
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background-color: #1f2937;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: none;
        }

        .clock-number {
            position: absolute;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #374151;
            transform: translate(-50%, -50%);
            pointer-events: none;
            user-select: none;
        }

        /* SVG for the angle arc */
        .angle-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Tick marks */
        .tick {
            position: absolute;
            left: 50%;
            top: 0; /* Will be pushed down by radius */
            width: 2px;
            height: 10px;
            background-color: #e5e7eb;
            transform-origin: center 150px; /* Assuming 300px clock */
            pointer-events: none;
        }
        .tick.major {
            height: 15px;
            width: 4px;
            background-color: #d1d5db;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col items-center justify-center text-slate-800 overflow-hidden">

    <div class="w-full max-w-md px-4 flex flex-col items-center space-y-6">
        
        <header class="text-center">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">时钟夹角学习</h1>
            <p class="text-slate-500 text-sm">拖动指针或输入时间来观察夹角</p>
        </header>

        <!-- Clock Container -->
        <div class="relative w-[300px] h-[300px] clock-face border-4 border-slate-200" id="clockContainer">
            <!-- SVG Layer for Angle Visualization -->
            <svg class="angle-svg" id="angleSvg" viewBox="0 0 300 300">
                <path id="angleArc" d="" fill="rgba(251, 191, 36, 0.3)" stroke="#fbbf24" stroke-width="2" style="display: none;"/>
                <text id="angleTextOnClock" x="150" y="100" text-anchor="middle" class="text-lg font-bold fill-amber-600" style="display: none;">90°</text>
            </svg>

            <!-- Ticks and Numbers will be generated by JS -->
            <div id="ticksContainer"></div>
            <div id="numbersContainer"></div>

            <!-- Hands -->
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="center-dot"></div>
        </div>

        <!-- Angle Display -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 w-full flex flex-col items-center">
            <div class="flex items-center justify-between w-full mb-4">
                <span class="text-slate-600 font-medium">显示度数</span>
                <button id="toggleAngleBtn" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-200 transition-colors focus:outline-none">
                    <span class="sr-only">Toggle Angle</span>
                    <span id="toggleKnob" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
                </button>
            </div>
            
            <div id="angleDisplayArea" class="hidden flex-col items-center animate-fade-in">
                <div class="text-5xl font-bold text-amber-500 mb-1"><span id="angleValue">90</span>°</div>
                <div class="text-xs text-slate-400">时针与分针的夹角</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-2 gap-4 w-full">
            <div class="flex flex-col space-y-1">
                <label class="text-xs font-bold text-slate-500 ml-1">时 (Hour)</label>
                <input type="number" id="inputHour" min="1" max="12" step="1" value="3" class="p-3 border border-slate-200 rounded-lg text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="flex flex-col space-y-1">
                <label class="text-xs font-bold text-slate-500 ml-1">分 (Minute)</label>
                <input type="number" id="inputMinute" min="0" max="59" step="1" value="0" class="p-3 border border-slate-200 rounded-lg text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
        </div>
        
        <div class="flex space-x-2">
             <button id="setTimeBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-6 rounded-lg font-semibold shadow-md transition-transform active:scale-95">
                设定时间
            </button>
            <button id="randomTimeBtn" class="bg-white border border-slate-200 hover:bg-slate-50 text-indigo-600 py-2 px-4 rounded-lg font-semibold transition-colors">
                随机时间
            </button>
        </div>

    </div>

    <script>
        // --- Configuration & State ---
        const state = {
            hours: 3,
            minutes: 0,
            showAngle: false,
            isDragging: false,
            activeHand: null // 'hour' or 'minute'
        };

        // --- DOM Elements ---
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');
        const angleArc = document.getElementById('angleArc');
        const angleTextOnClock = document.getElementById('angleTextOnClock');
        const angleValue = document.getElementById('angleValue');
        const angleDisplayArea = document.getElementById('angleDisplayArea');
        const toggleAngleBtn = document.getElementById('toggleAngleBtn');
        const toggleKnob = document.getElementById('toggleKnob');
        const inputHour = document.getElementById('inputHour');
        const inputMinute = document.getElementById('inputMinute');
        const setTimeBtn = document.getElementById('setTimeBtn');
        const clockContainer = document.getElementById('clockContainer');
        const ticksContainer = document.getElementById('ticksContainer');
        const numbersContainer = document.getElementById('numbersContainer');
        const randomTimeBtn = document.getElementById('randomTimeBtn');

        // --- Initialization ---
        function init() {
            drawFace();
            updateClock();
            
            // Event Listeners
            const updateFromInput = () => {
                let h = parseInt(inputHour.value) || 12;
                let m = parseInt(inputMinute.value) || 0;
                setTime(h, m);
            };

            setTimeBtn.addEventListener('click', updateFromInput);
            inputHour.addEventListener('input', updateFromInput);
            inputMinute.addEventListener('input', updateFromInput);

            randomTimeBtn.addEventListener('click', () => {
                const h = Math.floor(Math.random() * 12) + 1;
                const m = Math.floor(Math.random() * 60);
                inputHour.value = h;
                inputMinute.value = m;
                setTime(h, m);
            });

            toggleAngleBtn.addEventListener('click', toggleAngleDisplay);

            // Dragging Logic
            hourHand.addEventListener('mousedown', (e) => startDrag(e, 'hour'));
            minuteHand.addEventListener('mousedown', (e) => startDrag(e, 'minute'));
            hourHand.addEventListener('touchstart', (e) => startDrag(e, 'hour'), {passive: false});
            minuteHand.addEventListener('touchstart', (e) => startDrag(e, 'minute'), {passive: false});

            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
            window.addEventListener('touchmove', drag, {passive: false});
            window.addEventListener('touchend', stopDrag);
        }

        // --- Visual Setup ---
        function drawFace() {
            const radius = 150; // Half of 300px
            
            // Draw ticks
            for (let i = 0; i < 60; i++) {
                const tick = document.createElement('div');
                tick.className = `tick ${i % 5 === 0 ? 'major' : ''}`;
                tick.style.transform = `rotate(${i * 6}deg) translateY(0)`;
                // We need to offset the translateY by the container logic, 
                // but standard rotation around center works if origin is correct.
                // CSS defines origin as center 150px.
                ticksContainer.appendChild(tick);
            }

            // Draw Numbers
            for (let i = 1; i <= 12; i++) {
                const angle = i * 30; // 30 degrees per hour
                const rad = (angle - 90) * (Math.PI / 180);
                const distance = 120; // Distance from center
                const x = 150 + distance * Math.cos(rad);
                const y = 150 + distance * Math.sin(rad);
                
                const num = document.createElement('div');
                num.className = 'clock-number';
                num.textContent = i;
                num.style.left = x + 'px';
                num.style.top = y + 'px';
                numbersContainer.appendChild(num);
            }
        }

        // --- Core Logic ---
        function setTime(h, m) {
            // Normalize inputs
            if (h > 12) h = h - 12;
            if (h < 1) h = 12;
            if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
            if (m < 0) { m = 0; }
            
            state.hours = h;
            state.minutes = m;

            // Update inputs just in case they are out of sync
            inputHour.value = state.hours;
            inputMinute.value = state.minutes;

            updateClock();
        }

        function updateClock() {
            const { hours, minutes } = state;
            
            // Calculate angles
            const minuteAngle = minutes * 6; // 360 / 60
            const hourAngle = ((hours % 12) * 30) + (minutes * 0.5);

            // Apply rotation
            minuteHand.style.transform = `rotate(${minuteAngle}deg)`;
            hourHand.style.transform = `rotate(${hourAngle}deg)`;

            updateAngleVisualization(hourAngle, minuteAngle);
        }

        function updateAngleVisualization(hAngle, mAngle) {
            // Normalize angles to 0-360
            let ha = hAngle % 360;
            let ma = mAngle % 360;
            if (ha < 0) ha += 360;
            if (ma < 0) ma += 360;

            // Calculate difference
            let diff = Math.abs(ha - ma);
            if (diff > 180) diff = 360 - diff;

            // Update Text
            // Avoid displaying decimals like 90.0
            const displayDiff = Number.isInteger(diff) ? diff : diff.toFixed(1);
            angleValue.textContent = displayDiff;
            angleTextOnClock.textContent = displayDiff + '°';

            if (!state.showAngle) {
                angleArc.style.display = 'none';
                angleTextOnClock.style.display = 'none';
                return;
            }

            angleArc.style.display = 'block';
            angleTextOnClock.style.display = 'block';

            // Draw Arc
            // We want to draw the shortest arc between the two angles
            // Start from the smaller angle (visually)
            
            // SVG Coordinate math
            // Center is 150,150. Radius e.g., 50
            const r = 60;
            const cx = 150;
            const cy = 150;

            // To draw the arc correctly, we need to know start and end in radians.
            // 0 degrees in clock is -90 degrees in SVG trigonometry (12 o'clock vs 3 o'clock)
            
            let startAngle = Math.min(ha, ma);
            let endAngle = Math.max(ha, ma);
            
            // Check if crossing the 12 o'clock boundary is shorter
            if (endAngle - startAngle > 180) {
                // Crossing boundary
                const temp = startAngle;
                startAngle = endAngle;
                endAngle = temp + 360; 
            }

            // Convert to radians, subtracting 90 deg to rotate coordinate system
            const startRad = (startAngle - 90) * Math.PI / 180;
            const endRad = (endAngle - 90) * Math.PI / 180;

            const x1 = cx + r * Math.cos(startRad);
            const y1 = cy + r * Math.sin(startRad);
            const x2 = cx + r * Math.cos(endRad);
            const y2 = cy + r * Math.sin(endRad);

            // Flag for large arc (always 0 here because we selected the smaller angle <= 180)
            const largeArcFlag = 0;
            const sweepFlag = 1; // Clockwise

            const d = [
                "M", cx, cy,
                "L", x1, y1,
                "A", r, r, 0, largeArcFlag, sweepFlag, x2, y2,
                "Z"
            ].join(" ");

            angleArc.setAttribute("d", d);
            
            // Position text slightly further out in the middle of the angle
            const midAngle = (startAngle + endAngle) / 2;
            const midRad = (midAngle - 90) * Math.PI / 180;
            const textDist = 90;
            const tx = cx + textDist * Math.cos(midRad);
            const ty = cy + textDist * Math.sin(midRad);
            
            angleTextOnClock.setAttribute("x", tx);
            angleTextOnClock.setAttribute("y", ty);
        }

        function toggleAngleDisplay() {
            state.showAngle = !state.showAngle;
            
            if (state.showAngle) {
                toggleKnob.classList.remove('translate-x-1');
                toggleKnob.classList.add('translate-x-6');
                toggleAngleBtn.classList.remove('bg-slate-200');
                toggleAngleBtn.classList.add('bg-indigo-500');
                angleDisplayArea.classList.remove('hidden');
                angleDisplayArea.classList.add('flex');
            } else {
                toggleKnob.classList.remove('translate-x-6');
                toggleKnob.classList.add('translate-x-1');
                toggleAngleBtn.classList.remove('bg-indigo-500');
                toggleAngleBtn.classList.add('bg-slate-200');
                angleDisplayArea.classList.remove('flex');
                angleDisplayArea.classList.add('hidden');
            }

            updateClock();
        }

        // --- Dragging Implementation ---
        function startDrag(e, handType) {
            e.preventDefault();
            state.isDragging = true;
            state.activeHand = handType;
        }

        function stopDrag() {
            state.isDragging = false;
            state.activeHand = null;
        }

        function drag(e) {
            if (!state.isDragging) return;
            e.preventDefault();

            const rect = clockContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const dx = clientX - centerX;
            const dy = clientY - centerY;
            
            // Calculate angle in degrees (0-360)
            // atan2 returns -PI to PI. 0 is at 3 o'clock.
            let rad = Math.atan2(dy, dx);
            let deg = rad * (180 / Math.PI);
            
            // Convert to clock coordinates (0 at 12 o'clock)
            deg = deg + 90; 
            if (deg < 0) deg += 360;

            if (state.activeHand === 'minute') {
                // Snap to nearest minute (6 degrees)
                const snappedDeg = Math.round(deg / 6) * 6;
                const minutes = Math.round(snappedDeg / 6) % 60;
                
                // To make dragging feel real, we need to detect full rotations to update hour
                // But for this simple app, let's just update the minute field 
                // and let the existing logic handle the hour hand position relative to minutes.
                // However, to strictly follow the finger, we should update the input.
                
                // Refinement: If we just set Minute, the hour hand stays at H:00? 
                // No, updateClock uses (Hour + Min/60).
                // So dragging minute hand changes the minute value, which slightly moves hour hand.
                
                state.minutes = minutes;
                inputMinute.value = minutes;
                
            } else if (state.activeHand === 'hour') {
                // Snap to nearest reasonable increment (e.g. every 10 mins visually? or just hour)
                // Let's allow snapping to every 12 minutes (6 degrees of hour hand = 12 minutes time) 
                // or just calculate the "Time" based on hour hand position.
                
                // Hour hand moves 30 deg per hour. 0.5 deg per minute.
                // Time in hours = deg / 30.
                const totalHours = deg / 30;
                let h = Math.floor(totalHours);
                if (h === 0) h = 12;
                const remainderFraction = totalHours - Math.floor(totalHours);
                const m = Math.round(remainderFraction * 60);
                
                state.hours = h;
                state.minutes = m;
                
                inputHour.value = h;
                inputMinute.value = m;
            }
            
            setTime(state.hours, state.minutes);
        }

        // Run
        init();

    </script>
</body>
</html>
