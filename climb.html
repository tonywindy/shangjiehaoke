<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两位数乘法登山挑战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 游戏主色调 */
            --primary-color: #4299e1;
            --accent-color: #48bb78;
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: 1px solid rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            touch-action: manipulation;
            background: #87CEEB;
            /* Fallback */
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            /* Sky to Grass */
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Containers */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
        }

        .numpad-btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            top: 0;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.2);
        }

        .numpad-btn:active {
            top: 4px;
            box-shadow: 0 0px 0px rgba(0, 0, 0, 0.2);
            transform: scale(0.98);
        }

        /* 3D Button Styles based on color */
        .btn-default {
            background-color: #edf2f7;
            color: #2d3748;
            box-shadow: 0 4px 0 #cbd5e0;
        }

        .btn-default:active {
            box-shadow: 0 0 0 #cbd5e0;
            background-color: #e2e8f0;
        }

        .btn-number {
            background-color: #fff;
            color: #2b6cb0;
            font-weight: 800;
            box-shadow: 0 4px 0 #bfdbfe;
            border: 2px solid #bee3f8;
        }

        .btn-number:active {
            box-shadow: 0 0 0 #bfdbfe;
            background-color: #ebf8ff;
        }

        .btn-enter {
            background-color: #48bb78;
            color: white;
            box-shadow: 0 4px 0 #2f855a;
        }

        .btn-enter:active {
            box-shadow: 0 0 0 #2f855a;
            background-color: #38a169;
        }

        .btn-clear {
            background-color: #ed8936;
            color: white;
            box-shadow: 0 4px 0 #c05621;
        }

        .btn-clear:active {
            box-shadow: 0 0 0 #c05621;
            background-color: #dd6b20;
        }


        .animal {
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* Bouncy effect */
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            z-index: 10;
        }

        .mountain-path {
            position: absolute;
            left: 50%;
            top: 15%;
            /* Leave room for summit */
            bottom: 10%;
            width: 12px;
            background: repeating-linear-gradient(to top,
                    #718096 0px,
                    #718096 4px,
                    transparent 4px,
                    transparent 20px);
            border-left: 2px solid #718096;
            border-right: 2px solid #718096;
            transform: translateX(-50%);
            opacity: 0.6;
        }

        .checkpoint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(50%);
            width: 24px;
            height: 24px;
            font-size: 20px;
            line-height: 1;
            text-align: center;
            z-index: 5;
        }

        .summit-flag {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.3));
            z-index: 5;
            animation: wave 2s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes wave {

            0%,
            100% {
                transform: translateX(-50%) rotate(0deg);
            }

            50% {
                transform: translateX(-50%) rotate(5deg);
            }
        }

        .incorrect-answer {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border: 2px solid #e53e3e !important;
            background-color: #fff5f5 !important;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* 结束动画样式 */
        #animation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 200;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 4px;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg) scale(0.5);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        .winner-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            padding: 30px 60px;
            background: linear-gradient(135deg, #ffd700, #ffae00);
            color: white;
            font-size: 4rem;
            font-weight: 900;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
            animation: winner-zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 101;
            white-space: nowrap;
        }

        @keyframes winner-zoom {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-15deg);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .loser-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: 90;
            border-radius: 24px;
        }

        .question-box {
            background: white;
            border-radius: 20px;
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 2px solid #e2e8f0;
            display: inline-block;
            position: relative;
        }

        .question-box::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #e2e8f0 transparent transparent transparent;
        }

        .correct-answer {
            animation: pulse-green 0.5s ease-out;
            background-color: #f0fff4 !important;
            border-color: #48bb78 !important;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(72, 187, 120, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(72, 187, 120, 0);
            }
        }
    </style>
</head>

<body class="text-gray-800 flex items-center justify-center min-h-screen">

    <div id="app-container" class="w-full max-w-6xl mx-auto p-4">

        <!-- 欢迎/主菜单界面 -->
        <div id="lobby-screen" class="text-center glass-panel p-10 max-w-2xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-black mb-6 text-blue-800 tracking-tight"
                style="text-shadow: 2px 2px 0px rgba(255,255,255,0.5);">⛰️ 混合运算登山赛</h1>
            <p class="text-gray-700 text-xl mb-10 font-medium">准备好攀登智慧的高峰了吗？</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button onclick="showSinglePlayerSetup()"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-md transition-transform transform hover:scale-105">
                    👤 单人模式
                </button>
                <button onclick="showDualPlayerSetup()"
                    class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-md transition-transform transform hover:scale-105">
                    👥 双人模式
                </button>
            </div>

            <!-- 单人模式设置 -->
            <div id="single-player-setup" class="hidden mt-8 max-w-md mx-auto bg-gray-50 p-6 rounded-lg">
                <h2 class="text-2xl font-bold mb-4 text-gray-600">单人挑战设置</h2>
                <div class="mb-4">
                    <label class="block text-lg font-medium text-gray-700 mb-2">题目数量:</label>
                    <div class="flex justify-center gap-3" data-setting-type="questions">
                        <button onclick="setGameOption('single', 'questions', 5, this)"
                            class="game-option-btn bg-white border-2 border-blue-500 text-blue-500 py-2 px-5 rounded-lg font-semibold">5题</button>
                        <button onclick="setGameOption('single', 'questions', 10, this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-5 rounded-lg font-semibold">10题</button>
                        <button onclick="setGameOption('single', 'questions', 15, this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-5 rounded-lg font-semibold">15题</button>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-lg font-medium text-gray-700 mb-2">挑战内容:</label>
                    <div class="grid grid-cols-2 gap-3" data-setting-type="mode">
                        <button onclick="setGameOption('single', 'mode', 'mul_2x2', this)"
                            class="game-option-btn bg-white border-2 border-green-500 text-green-500 py-2 px-2 rounded-lg font-semibold text-sm">两位数×两位数</button>
                        <button onclick="setGameOption('single', 'mode', 'mul_2x1', this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-2 rounded-lg font-semibold text-sm">两位数×一位数</button>
                        <button onclick="setGameOption('single', 'mode', 'div_2_1', this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-2 rounded-lg font-semibold text-sm">两位数÷一位数</button>
                        <button onclick="setGameOption('single', 'mode', 'addsub_3', this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-2 rounded-lg font-semibold text-sm">三位数加减</button>
                    </div>
                </div>
                <button onclick="setupGame('single')"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-md transition-transform transform hover:scale-105">
                    💪 开始挑战
                </button>
            </div>

            <!-- 双人模式设置 -->
            <div id="dual-player-setup" class="hidden mt-8 max-w-md mx-auto bg-gray-50 p-6 rounded-lg">
                <h2 class="text-2xl font-bold mb-4 text-gray-600">双人对战设置</h2>
                <div class="mb-4">
                    <label class="block text-lg font-medium text-gray-700 mb-2">题目数量:</label>
                    <div class="flex justify-center gap-3" data-setting-type="questions">
                        <button onclick="setGameOption('dual', 'questions', 5, this)"
                            class="game-option-btn bg-white border-2 border-blue-500 text-blue-500 py-2 px-5 rounded-lg font-semibold">5题</button>
                        <button onclick="setGameOption('dual', 'questions', 10, this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-5 rounded-lg font-semibold">10题</button>
                        <button onclick="setGameOption('dual', 'questions', 15, this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-5 rounded-lg font-semibold">15题</button>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-lg font-medium text-gray-700 mb-2">挑战内容:</label>
                    <div class="grid grid-cols-2 gap-3" data-setting-type="mode">
                        <button onclick="setGameOption('dual', 'mode', 'mul_2x2', this)"
                            class="game-option-btn bg-white border-2 border-green-500 text-green-500 py-2 px-2 rounded-lg font-semibold text-sm">两位数×两位数</button>
                        <button onclick="setGameOption('dual', 'mode', 'mul_2x1', this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-2 rounded-lg font-semibold text-sm">两位数×一位数</button>
                        <button onclick="setGameOption('dual', 'mode', 'div_2_1', this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-2 rounded-lg font-semibold text-sm">两位数÷一位数</button>
                        <button onclick="setGameOption('dual', 'mode', 'addsub_3', this)"
                            class="game-option-btn bg-white border-2 border-gray-300 text-gray-500 py-2 px-2 rounded-lg font-semibold text-sm">三位数加减</button>
                    </div>
                </div>
                <button onclick="setupGame('dual')"
                    class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-md transition-transform transform hover:scale-105">
                    🚀 开始对战
                </button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="hidden w-full">
            <!-- BGM -->
            <audio id="bgm" loop>
                <source src="public/climbbgm.MP3" type="audio/mpeg">
            </audio>

            <button onclick="quitGame()"
                class="mb-4 bg-gray-500 bg-opacity-50 hover:bg-opacity-80 text-white font-bold py-2 px-4 rounded-full text-sm backdrop-filter backdrop-blur-sm transition-all">
                ⬅ 返回主菜单
            </button>
            <div id="game-area" class="flex flex-col md:flex-row gap-4 w-full">
                <!-- 玩家模板，JS会复制这个结构 -->
            </div>
        </div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="game-over-screen" class="hidden text-center glass-panel p-10 max-w-2xl mx-auto z-50 relative">
        <h2 id="game-over-title" class="text-4xl md:text-5xl font-bold mb-4">游戏结束</h2>
        <p id="game-over-message" class="text-2xl text-gray-600 mb-8"></p>
        <button onclick="showLobby()"
            class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-md transition-transform transform hover:scale-105">
            返回主菜单
        </button>
    </div>
    </div>

    <!-- 动画层 -->
    <div id="animation-overlay"></div>

    <!-- 玩家游戏区域的HTML模板 -->
    <template id="player-template">
        <div
            class="player-container flex-1 glass-panel p-4 flex flex-col md:flex-row gap-4 min-w-0 relative transition-transform">
            <!-- 左侧：答题区域 (默认顺序) -->
            <div class="quiz-panel w-full md:w-3/5 lg:w-2/3 flex flex-col items-center justify-center p-2">
                <div class="question-display w-full text-center mb-6">
                    <div class="question-box">
                        <p class="text-3xl md:text-5xl font-black tracking-wider text-gray-700"></p>
                    </div>
                </div>
                <div
                    class="answer-input w-full h-20 bg-white border-2 border-blue-200 rounded-2xl mb-6 text-5xl font-mono flex items-center justify-center text-blue-600 shadow-inner">
                </div>
                <div class="numpad grid grid-cols-3 gap-3 w-full max-w-xs mx-auto">
                    <!-- 数字键会由JS生成 -->
                    <button data-key="clear"
                        class="numpad-btn btn-clear text-xl font-bold rounded-xl p-3 col-span-1">⌫</button>
                    <button data-key="0"
                        class="numpad-btn btn-number text-2xl font-bold rounded-xl p-3 col-span-1">0</button>
                    <button data-key="enter"
                        class="numpad-btn btn-enter text-2xl font-bold rounded-xl p-3 col-span-1">GO</button>
                </div>
            </div>
            <!-- 右侧：登山进度 (默认顺序) -->
            <div
                class="progress-panel w-full md:w-2/5 lg:w-1/3 bg-blue-50 bg-opacity-50 rounded-2xl relative overflow-hidden h-72 md:h-auto border border-blue-100 shadow-inner">
                <div class="summit-flag">🏆</div>
                <div class="mountain-path"></div>
                <div class="checkpoints-container"></div>
                <div class="animal absolute bottom-0 left-1/2 -translate-x-1/2 mb-[-5px]"></div>
                <div
                    class="player-name absolute top-2 left-2 bg-white bg-opacity-80 text-blue-800 text-sm font-bold px-3 py-1 rounded-full shadow-sm">
                </div>
                <div
                    class="timer absolute top-2 right-2 bg-gray-800 text-white text-sm font-bold px-3 py-1 rounded-full shadow-sm font-mono">
                    00:00</div>
            </div>
        </div>
    </template>

    <script>
        // DOM 元素获取
        const lobbyScreen = document.getElementById('lobby-screen');
        const singlePlayerSetupScreen = document.getElementById('single-player-setup');
        const dualPlayerSetupScreen = document.getElementById('dual-player-setup');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameArea = document.getElementById('game-area');
        const playerTemplate = document.getElementById('player-template');
        const animationOverlay = document.getElementById('animation-overlay');
        const bgm = document.getElementById('bgm');

        // 游戏状态
        let gameState = {}; // isOver, gameInterval, etc.
        const animals = ['🐼', '🐵', '🦊', '🦁', '🐸', '🦄', '🚀', '🐢'];

        // 游戏设置
        let singleGameSettings = { questions: 5, mode: 'mul_2x2' };
        let dualGameSettings = { questions: 5, mode: 'mul_2x2' };

        // --- 界面切换函数 ---
        function showLobby() {
            lobbyScreen.classList.remove('hidden');
            gameScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            singlePlayerSetupScreen.classList.add('hidden');
            dualPlayerSetupScreen.classList.add('hidden');
            gameArea.innerHTML = '';
        }

        function showSinglePlayerSetup() {
            singlePlayerSetupScreen.classList.remove('hidden');
            dualPlayerSetupScreen.classList.add('hidden');
        }

        function showDualPlayerSetup() {
            dualPlayerSetupScreen.classList.remove('hidden');
            singlePlayerSetupScreen.classList.add('hidden');
        }

        function showGame() {
            lobbyScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
        }

        function showGameOver() {
            gameScreen.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }

        // --- 游戏设置 ---
        function setGameOption(mode, type, value, element) {
            const settings = mode === 'single' ? singleGameSettings : dualGameSettings;
            settings[type] = value;

            const parent = element.parentElement;
            parent.querySelectorAll('.game-option-btn').forEach(btn => {
                btn.classList.remove('border-blue-500', 'text-blue-500', 'border-green-500', 'text-green-500');
                btn.classList.add('border-gray-300', 'text-gray-500');
            });

            const activeColor = type === 'questions' ? ['border-blue-500', 'text-blue-500'] : ['border-green-500', 'text-green-500'];
            element.classList.remove('border-gray-300', 'text-gray-500');
            element.classList.add(...activeColor);
        }

        // --- 游戏核心逻辑 ---
        function setupGame(mode) {
            gameState.mode = mode;
            gameState.players = [];
            gameState.gameInterval = null;
            gameState.isOver = false;

            if (mode === 'single') {
                createPlayer(0, singleGameSettings.questions, singleGameSettings.mode);
            } else {
                const shuffledAnimals = [...animals].sort(() => 0.5 - Math.random());
                createPlayer(0, dualGameSettings.questions, dualGameSettings.mode, shuffledAnimals[0]);
                createPlayer(1, dualGameSettings.questions, dualGameSettings.mode, shuffledAnimals[1]);

                const questionBank = generateQuestionBank(dualGameSettings.questions, dualGameSettings.mode);
                gameState.players[0].questions = [...questionBank].sort(() => 0.5 - Math.random());
                gameState.players[1].questions = [...questionBank].sort(() => 0.5 - Math.random());
            }

            showGame();
            startGame();
        }

        function createPlayer(index, totalQuestions, difficulty, animal) {
            const playerNode = playerTemplate.content.cloneNode(true);
            const playerContainer = playerNode.querySelector('.player-container');

            if (gameState.mode === 'dual' && index === 1) {
                playerContainer.classList.add('md:flex-row-reverse');
            }

            playerContainer.dataset.playerId = index;
            const playerName = gameState.mode === 'single' ? '挑战者' : `玩家 ${index + 1}`;
            playerContainer.querySelector('.player-name').textContent = playerName;

            const selectedAnimal = animal || animals[Math.floor(Math.random() * animals.length)];
            playerContainer.querySelector('.animal').textContent = selectedAnimal;

            const numpad = playerContainer.querySelector('.numpad');
            const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9'];
            keys.forEach(key => {
                const button = document.createElement('button');
                button.textContent = key;
                button.dataset.key = key;
                button.className = "numpad-btn btn-number text-2xl font-bold rounded-xl p-3";
                numpad.prepend(button);
            });

            gameArea.appendChild(playerNode);

            const checkpointsContainer = playerContainer.querySelector('.checkpoints-container');
            for (let i = 1; i <= totalQuestions; i++) {
                const checkpoint = document.createElement('div');
                checkpoint.className = 'checkpoint';
                checkpoint.textContent = '⛳'; // Flag
                const progressPercentage = (i / (totalQuestions + 1)) * 100;
                checkpoint.style.bottom = `${progressPercentage}%`;
                checkpointsContainer.appendChild(checkpoint);
            }

            const playerData = {
                id: index,
                score: 0,
                totalQuestions: totalQuestions,
                questions: generateQuestionBank(totalQuestions, difficulty),
                currentQuestionIndex: 0,
                startTime: null,
                elapsedTime: 0,
                answer: '',
                ui: {
                    container: document.querySelector(`.player-container[data-player-id='${index}']`),
                    questionDisplay: document.querySelector(`.player-container[data-player-id='${index}'] .question-display p`),
                    answerInput: document.querySelector(`.player-container[data-player-id='${index}'] .answer-input`),
                    animal: document.querySelector(`.player-container[data-player-id='${index}'] .animal`),
                    timer: document.querySelector(`.player-container[data-player-id='${index}'] .timer`),
                }
            };

            playerData.ui.container.querySelector('.numpad').addEventListener('click', (e) => handleNumpad(e, index));
            gameState.players.push(playerData);
        }

        function generateQuestionBank(count, mode) {
            const questions = new Set();
            const questionArray = [];
            const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            while (questions.size < count) {
                let qText, qAnswer;

                try {
                    switch (mode) {
                        case 'mul_2x2': { // 2-digit x 2-digit
                            const a = randInt(10, 99);
                            const b = randInt(10, 99);
                            qText = `${a} × ${b}`;
                            qAnswer = a * b;
                            break;
                        }
                        case 'mul_2x1': { // 2-digit x 1-digit
                            const a = randInt(10, 99);
                            const b = randInt(2, 9);
                            qText = `${a} × ${b}`;
                            qAnswer = a * b;
                            break;
                        }
                        case 'div_2_1': { // 2-digit / 1-digit
                            const divisor = randInt(2, 9);
                            const quotient = randInt(10, 50);
                            const dividend = divisor * quotient;
                            // Ensure 2-digit dividend < 100
                            if (dividend >= 100) continue;

                            qText = `${dividend} ÷ ${divisor}`;
                            qAnswer = quotient;
                            break;
                        }
                        case 'addsub_3': { // 3-digit Add/Sub
                            if (Math.random() > 0.5) {
                                // Addition
                                const a = randInt(100, 899);
                                const b = randInt(100, 999 - a);
                                qText = `${a} + ${b}`;
                                qAnswer = a + b;
                            } else {
                                // Subtraction
                                const a = randInt(100, 999);
                                const b = randInt(100, a - 100);
                                qText = `${a} - ${b}`;
                                qAnswer = a - b;
                            }
                            break;
                        }
                        default: {
                            // Fallback (e.g. if mixed or easy/hard is somehow passed)
                            const a = randInt(2, 9);
                            const b = randInt(2, 9);
                            qText = `${a} × ${b}`;
                            qAnswer = a * b;
                        }
                    }

                    if (!questions.has(qText)) {
                        questions.add(qText);
                        questionArray.push({ displayText: `${qText} = ?`, answer: qAnswer });
                    }
                } catch (e) { }
            }
            return questionArray;
        }

        function startGame() {
            const now = Date.now();
            gameState.players.forEach(p => {
                p.startTime = now;
                displayQuestion(p.id);
            });

            gameState.gameInterval = setInterval(updateTimers, 1000);

            // Try to play BGM
            bgm.currentTime = 0;
            bgm.play().catch(e => console.log("Audio play failed (user interaction needed likely):", e));
        }

        function quitGame() {
            gameState.isOver = true;
            clearInterval(gameState.gameInterval);
            bgm.pause();
            bgm.currentTime = 0;
            showLobby();
        }

        function updateTimers() {
            if (gameState.isOver) return;
            const now = Date.now();
            gameState.players.forEach(p => {
                p.elapsedTime = Math.floor((now - p.startTime) / 1000);
                const minutes = String(Math.floor(p.elapsedTime / 60)).padStart(2, '0');
                const seconds = String(p.elapsedTime % 60).padStart(2, '0');
                p.ui.timer.textContent = `${minutes}:${seconds}`;
            });
        }

        function displayQuestion(playerId) {
            const player = gameState.players[playerId];
            if (player.currentQuestionIndex < player.questions.length) {
                const q = player.questions[player.currentQuestionIndex];
                player.ui.questionDisplay.textContent = q.displayText;
                player.answer = '';
                player.ui.answerInput.textContent = '';
            }
        }

        function handleNumpad(event, playerId) {
            if (gameState.isOver) return;
            const key = event.target.dataset.key;
            if (!key) return;

            const player = gameState.players[playerId];

            if (key >= '0' && key <= '9') {
                if (player.answer.length < 6) player.answer += key;
            } else if (key === 'clear') {
                player.answer = player.answer.slice(0, -1);
            } else if (key === 'enter') {
                checkAnswer(playerId);
            }

            player.ui.answerInput.textContent = player.answer;
        }

        function checkAnswer(playerId) {
            const player = gameState.players[playerId];
            const q = player.questions[player.currentQuestionIndex];

            if (parseInt(player.answer) === q.answer) {
                player.score++;

                // Visual Feedback
                player.ui.answerInput.classList.add('correct-answer');
                setTimeout(() => {
                    player.ui.answerInput.classList.remove('correct-answer');
                }, 500);

                updateProgress(playerId);
                player.currentQuestionIndex++;

                if (player.score >= player.totalQuestions) {
                    endGame(playerId);
                } else {
                    displayQuestion(playerId);
                }
            } else {
                player.ui.answerInput.classList.add('incorrect-answer');
                setTimeout(() => {
                    player.ui.answerInput.classList.remove('incorrect-answer');
                }, 500);
            }
        }

        function updateProgress(playerId) {
            const player = gameState.players[playerId];
            const progressPercentage = (player.score / (player.totalQuestions + 1)) * 100;
            player.ui.animal.style.bottom = `${progressPercentage}%`;
        }

        function endGame(winnerId = null) {
            if (gameState.isOver) return;
            gameState.isOver = true;
            clearInterval(gameState.gameInterval);
            updateTimers(); // 最后更新一次时间

            bgm.pause(); // Stop BGM on finish

            playEndAnimation(winnerId);

            setTimeout(() => {
                const title = document.getElementById('game-over-title');
                const message = document.getElementById('game-over-message');

                if (gameState.mode === 'single') {
                    const player = gameState.players[0];
                    title.textContent = '🎉 恭喜通关！ 🎉';
                    message.textContent = `你完成了所有题目，用时：${player.ui.timer.textContent}`;
                } else {
                    const winner = gameState.players[winnerId];
                    const loser = gameState.players[1 - winnerId];
                    title.textContent = `🏆 玩家 ${winnerId + 1} 获胜！ 🏆`;
                    message.innerHTML = `
                        <p>胜利者用时: ${winner.ui.timer.textContent}</p>
                        <p class="text-lg mt-2">玩家 ${loser.id + 1} 完成了 ${loser.score}/${loser.totalQuestions} 题</p>
                    `;
                }
                showGameOver();
            }, 3000); // 动画播放3秒后显示结果
        }

        function playEndAnimation(winnerId) {
            animationOverlay.innerHTML = ''; // 清空上一场动画
            if (gameState.mode === 'single') {
                // 彩带动画
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = `${Math.random() * 100}vw`;
                    confetti.style.animationDelay = `${Math.random() * 2}s`;
                    confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    animationOverlay.appendChild(confetti);
                }
            } else {
                // 胜利者动画
                const winner = gameState.players[winnerId];
                const loser = gameState.players[1 - winnerId];

                const banner = document.createElement('div');
                banner.className = 'winner-banner';
                banner.textContent = '胜利!';
                winner.ui.container.appendChild(banner);

                const loserOverlay = document.createElement('div');
                loserOverlay.className = 'loser-overlay';
                loser.ui.container.appendChild(loserOverlay);
            }
        }

        // 初始化
        window.onload = showLobby;
    </script>
</body>
